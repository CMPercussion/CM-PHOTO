<!DOCTYPE html>
<html lang="en">
<style>
  body {
    background-image: url('./../img/background.webp');
    background-size: 100%;
    background-position: center;  
    }
</style>
<head>
<meta charset="UTF-8">
<title>Portfolio Gallery</title>
<link rel="stylesheet" href="./../css/style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <img src="./../img/logo.svg" alt="./../img/logo.webp">
        </div>
        <div class="hamburger">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <ul class="nav-links">
            <li><a href="./../Index.html">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="./portfolio.html">Galleries</a></li>
            <li><a class="nav-cta-button" href="#contact">Contact</a></li>
        </ul>
    </nav>

    <div class="box">
    <p class="title-dec">
      Portfolio Gallery
    </p>
    <p class="body-c">
      This is the portfolio gallery for showcasing various photography projects.
    </p>
    <div class="btn-container">
    </div>
  </div>

  <!-- TITLE CARD GRID: the outer wrapper that holds all title cards and spaces them out evenly -->
  <div class="title-card-grid">

    <!-- TITLE CARD: one clickable card (image + title/style text) -->
    <a href="./Gallery Template/gal_temp.html" class="title-card">

      <!-- MEDIA: crops/frames the photo to a consistent aspect ratio -->
      <div class="title-card__media">
        <img
          class="title-card__image"
          src="./Gallery Template/card.jpg"
          alt="Portfolio title photo"
        >
      </div>

      <!-- TEXT: the white text block below the photo -->
      <div class="title-card__text">
        <p class="title-card__title">Spunk Monkees</p>
        <p class="title-card__style">Event/Concert</p>
      </div>

    </a>

    <!-- Repeat the .title-card block above for each additional card -->
    <a href="./take12/gal_take12.html" class="title-card">
      <div class="title-card__media">
        <img
          class="title-card__image"
          src="./take12/card.jpg"
          alt="Portfolio title photo"
        >
      </div>
      <div class="title-card__text">
        <p class="title-card__title">Take 12</p>
        <p class="title-card__style">Event/Concert</p>
      </div>
    </a>

    <a href="./Sample Gallery/sample.html" class="title-card">
      <div class="title-card__media">
        <img
          class="title-card__image"
          src="./Sample Gallery/card.jpg"
          alt="Portfolio title photo"
        >
      </div>
      <div class="title-card__text">
        <p class="title-card__title">Portfolio Title</p>
        <p class="title-card__style">Portfolio Style</p>
      </div>
    </a>

  </div>

</body>
<script src="./../js/navigation.js"></script>
<script src="./../js/jquery.js"></script>
<script src="./../js/script.js"></script>
</html>
